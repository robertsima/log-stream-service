openapi: 3.0.3

info:
  title: Log Stream Service API
  version: 1.1.0
  description: >
    Lightweight real-time log relay service. Applications register as log sources,
    generate ingestion tokens, send short-lived log events, and configure Slack
    or Discord webhook destinations for aggregated error alerts.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Dashboard authentication helpers
  - name: Users
    description: Authenticated user endpoints
  - name: Apps
    description: Log-producing application/source registration
  - name: App Tokens
    description: Ingestion token generation and management
  - name: Ingestion Tokens
    description: Resolve pasted ingestion tokens to app session context
  - name: Log Events
    description: Log ingestion endpoints
  - name: Alert Destinations
    description: Slack and Discord webhook destinations for aggregated error alerts
  - name: Alert Analysis
    description: Preview and analyze alert event payloads using the OpenAI prompt model

paths:
  /api/v1/users:
    post:
      tags:
        - Users
      operationId: createUser
      summary: Create a user
      deprecated: true
      description: Local bootstrap endpoint for AUTH_ENABLED=false. Production clients should use GET /api/v1/users/me.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me:
    get:
      tags:
        - Users
      operationId: getCurrentUser
      summary: Get or create the signed-in management user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Signed-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/demo-session:
    post:
      tags:
        - Auth
      operationId: createDemoSession
      summary: Create a demo dashboard session
      description: Returns a short-lived server-signed JWT only when demo bypass is enabled and the email matches DEMO_BYPASS_EMAIL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoSessionRequest'
      responses:
        '200':
          description: Demo session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSessionResponse'
        '403':
          description: Demo bypass disabled or email not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps:
    post:
      tags:
        - Apps
      operationId: createApp
      summary: Register a log-producing app/source
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppRequest'
      responses:
        '201':
          description: App/source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '404':
          description: Owner user not found when AUTH_ENABLED=false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: App quota or rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Apps
      operationId: getAppsByOwnerEmail
      summary: Get apps for the signed-in user
      security:
        - BearerAuth: []
      parameters:
        - name: ownerEmail
          in: query
          required: false
          schema:
            type: string
            format: email
          description: Optional legacy filter. When AUTH_ENABLED=true it must match the signed-in email.
      responses:
        '200':
          description: Apps found for owner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppResponse'

  /api/v1/apps/{appId}:
    get:
      tags:
        - Apps
      operationId: getAppById
      summary: Get app/source by id
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: App found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: App is owned by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/tokens:
    post:
      tags:
        - App Tokens
      operationId: createAppToken
      summary: Generate a one-time visible ingestion token
      description: >
        Creates an ingestion token for a registered app. The raw token is returned once.
        Store only a hash of the token in the database.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppTokenRequest'
      responses:
        '201':
          description: Token generated. Raw token is shown once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppTokenResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Token quota or rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - App Tokens
      operationId: getAppTokens
      summary: List app tokens without raw token values
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Tokens found for app
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppTokenResponse'

  /api/v1/apps/{appId}/tokens/{tokenId}/revoke:
    patch:
      tags:
        - App Tokens
      operationId: revokeAppToken
      summary: Revoke an ingestion token
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/TokenId'
      responses:
        '204':
          description: Token revoked
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations:
    post:
      tags:
        - Alert Destinations
      operationId: createAlertDestination
      summary: Create a Slack or Discord alert destination
      description: >
        Registers a Slack or Discord webhook destination for an app. ERROR logs
        for the app are aggregated and sent to enabled destinations.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertDestinationRequest'
      responses:
        '201':
          description: Alert destination created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDestinationResponse'
        '400':
          description: Invalid alert destination payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Alert Destinations
      operationId: getAlertDestinations
      summary: List enabled alert destinations for an app
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Alert destinations found for app
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertDestinationResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations/{destinationId}:
    delete:
      tags:
        - Alert Destinations
      operationId: deleteAlertDestination
      summary: Delete an alert destination
      description: Soft-deletes or disables a Slack/Discord alert destination.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/DestinationId'
      responses:
        '204':
          description: Alert destination deleted
        '404':
          description: Alert destination not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations/{destinationId}/test:
    post:
      tags:
        - Alert Destinations
      operationId: testAlertDestination
      summary: Send a test alert to a Slack or Discord destination
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/DestinationId'
      responses:
        '202':
          description: Test alert accepted
        '404':
          description: Alert destination not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations/{destinationId}/send-analyzed-alert:
    post:
      tags:
        - Alert Destinations
      operationId: sendAnalyzedAlert
      summary: Deliver an analyzed alert bucket to a Slack or Discord destination
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/DestinationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendAnalyzedAlertRequest'
      responses:
        '202':
          description: Analyzed alert accepted for delivery
        '404':
          description: Alert destination not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ingestion-tokens/session:
    get:
      tags:
        - Ingestion Tokens
      operationId: getIngestionTokenSession
      summary: Resolve an ingestion token to its app context
      description: >
        Validates a pasted ingestion token and returns the linked app metadata
        so clients can load destinations without running the full setup flow.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      responses:
        '200':
          description: Token resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionTokenSessionResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/log-events:
    post:
      tags:
        - Log Events
      operationId: ingestLogEvent
      summary: Ingest a log event from an external app
      description: >
        Accepts short-lived log events from registered apps. Events are authenticated
        using an app ingestion token and are not stored long-term.

        The payload is normalized tolerantly so JSON emitted by common logging stacks
        (Logback/Logstash, python-json-logger, Winston, Pino, Android, Flutter) is accepted
        without client-side mapping. See RawLogEvent for accepted field aliases. Canonical
        LogEventRequest payloads are always accepted unchanged.

        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawLogEvent'
      responses:
        '202':
          description: Log accepted for live relay
        '400':
          description: Invalid log payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Log payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/log-events/batch:
    post:
      tags:
        - Log Events
      operationId: ingestLogEventBatch
      summary: Ingest a batch of log events from an external app
      description: >
        Accepts up to 100 log events in one request. Each event is normalized with the
        same tolerant rules as the single-event endpoint. Events that cannot be normalized
        are reported per index in the response instead of failing the whole batch.
        Each event in the batch counts against the ingestion rate limit.

        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/RawLogEvent'
      responses:
        '202':
          description: Batch accepted; per-event results in body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEventBatchResponse'
        '400':
          description: Invalid batch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Batch payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Ingestion rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/alert-analysis/preview:
    post:
      tags:
        - Alert Analysis
      operationId: previewAlertPrompt
      summary: Preview the OpenAI prompt for an alert bucket
      description: Returns the generated prompt text without calling the model.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertBucketAnalysisRequest'
      responses:
        '200':
          description: Prompt preview generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertAnalysisPreviewResponse'
        '400':
          description: Invalid alert bucket payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/alert-analysis/analyze:
    post:
      tags:
        - Alert Analysis
      operationId: analyzeAlertBucket
      summary: Analyze an alert bucket using the OpenAI model
      description: Returns a concise analysis for the provided alert bucket.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertBucketAnalysisRequest'
      responses:
        '200':
          description: Alert bucket analyzed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertAnalysisResponse'
        '400':
          description: Invalid alert bucket payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token or server-issued demo JWT for management API calls.

  parameters:
    AppId:
      name: appId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    DestinationId:
      name: destinationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IngestionToken:
      name: X-Ingestion-Token
      in: header
      required: true
      schema:
        type: string
      description: App ingestion token generated for a registered log source.
      example: lss_live_f11n_Mx5e0xy46LJgbycTXsKBFL4qeEa

  schemas:
    CreateUserRequest:
      type: object
      required:
        - email
        - username
      properties:
        email:
          type: string
          format: email
          example: name@example.com
        username:
          type: string
          minLength: 3
          maxLength: 100
          example: name

    UserResponse:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CreateAppRequest:
      type: object
      required:
        - name
      properties:
        ownerEmail:
          type: string
          format: email
          deprecated: true
          description: Legacy local bootstrap field. Ignored when AUTH_ENABLED=true; owner is derived from Bearer token.
          example: name@example.com
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: payment-service
        description:
          type: string
          maxLength: 500
          nullable: true
          example: Sends live logs from the payment API.

    AppResponse:
      type: object
      required:
        - id
        - ownerUserId
        - name
        - active
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    DemoSessionRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: admin@email.com

    DemoSessionResponse:
      type: object
      required:
        - token
        - email
        - expiresInSeconds
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        expiresInSeconds:
          type: integer
          format: int32
          example: 3600

    CreateAppTokenRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: local-dev-token
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-12-31T23:59:59Z

    CreateAppTokenResponse:
      type: object
      required:
        - id
        - appId
        - name
        - token
        - tokenPrefix
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
          description: Raw ingestion token. Shown once.
          example: lss_live_VKpWnlcYiRz7IVQkDDN0t7QY6wc6zvm3
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AppTokenResponse:
      type: object
      required:
        - id
        - appId
        - name
        - tokenPrefix
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        name:
          type: string
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    IngestionTokenSessionResponse:
      type: object
      required:
        - appId
        - appName
        - tokenPrefix
        - tokenName
      properties:
        appId:
          type: string
          format: uuid
        appName:
          type: string
          example: payment-service
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        tokenName:
          type: string
          example: frontend-demo-token

    CreateAlertDestinationRequest:
      type: object
      required:
        - type
        - name
        - webhookUrl
      properties:
        type:
          $ref: '#/components/schemas/AlertDestinationType'
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: dev-alerts
        webhookUrl:
          type: string
          minLength: 1
          maxLength: 2000
          example: https://discord.com/api/webhooks/...

    AlertDestinationResponse:
      type: object
      required:
        - id
        - appId
        - type
        - name
        - enabled
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AlertDestinationType'
        name:
          type: string
        enabled:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    AlertBucketAnalysisRequest:
      type: object
      required:
        - appId
        - fingerprint
        - events
      properties:
        appId:
          type: string
          format: uuid
        fingerprint:
          type: string
          example: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        events:
          type: array
          items:
            $ref: '#/components/schemas/LogEventRequest'

    SendAnalyzedAlertRequest:
      type: object
      required:
        - fingerprint
        - events
        - analysis
      properties:
        fingerprint:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/LogEventRequest'
        analysis:
          type: string
          description: Formatted analysis text to include in the webhook payload.

    AlertAnalysisPreviewResponse:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          example: "You are a concise incident-response assistant..."
        promptCharCount:
          type: integer
          description: Character length of the full prompt text sent to the model.
          example: 842
        estimatedPromptTokens:
          type: integer
          description: Rough input token estimate (chars / 4). Preview only; analyze returns exact usage from OpenAI.
          example: 211

    TokenUsage:
      type: object
      properties:
        promptTokens:
          type: integer
          example: 186
        completionTokens:
          type: integer
          example: 94
        totalTokens:
          type: integer
          example: 280

    AlertAnalysisResponse:
      type: object
      required:
        - analysis
      properties:
        analysis:
          type: string
          description: Human-readable analysis formatted for Slack, Discord, and the dashboard.
        analysisJson:
          type: string
          description: Raw JSON object returned by the model before display formatting.
        cached:
          type: boolean
          description: True when the analysis was served from the in-memory cache (no OpenAI call).
          example: false
        tokenUsage:
          $ref: '#/components/schemas/TokenUsage'
          nullable: true

    AlertDestinationType:
      type: string
      enum:
        - DISCORD
        - SLACK

    RawLogEvent:
      type: object
      additionalProperties: true
      description: >
        Free-form log event JSON, normalized server-side into the canonical LogEventRequest.
        Accepted field aliases —
        message: message, msg, text, log, body (required; the only mandatory field);
        level: level, severity, levelname, level_name, loglevel, log_level, priority
        (strings such as warning, critical, fatal, verbose, or numeric Pino/Android levels;
        defaults to INFO);
        timestamp: occurredAt, occurred_at, timestamp, @timestamp, time, ts, datetime, date
        (ISO-8601 or epoch seconds/millis; defaults to server receive time);
        id: id, eventId, event_id, uuid, messageId (generated when missing);
        logger: logger, loggerName, logger_name, tag, source, name;
        trace: traceId, trace_id; span: spanId, span_id.
        Unrecognized fields are preserved under metadata.
      example:
        levelname: WARNING
        msg: Payment retry scheduled
        '@timestamp': 2026-06-08T18:30:00Z
        taskName: payments-worker

    LogEventBatchResponse:
      type: object
      required:
        - accepted
        - rejected
      properties:
        accepted:
          type: integer
          description: Number of events accepted for relay.
          example: 98
        rejected:
          type: array
          description: Events that could not be normalized or exceeded the rate limit.
          items:
            $ref: '#/components/schemas/LogEventBatchRejection'

    LogEventBatchRejection:
      type: object
      required:
        - index
        - reason
      properties:
        index:
          type: integer
          description: Zero-based index of the rejected event in the request array.
          example: 3
        reason:
          type: string
          example: Log event must include a message field.

    LogEventRequest:
      type: object
      required:
        - id
        - level
        - message
        - occurredAt
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 150
          description: Client-generated event id for traceability/idempotency.
          example: 01HZABC123
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
          minLength: 1
          maxLength: 5000
          example: Failed to process payment.
        occurredAt:
          type: string
          format: date-time
          example: 2026-06-08T18:30:00Z
        logger:
          type: string
          maxLength: 255
          nullable: true
          example: com.example.PaymentService
        traceId:
          type: string
          maxLength: 150
          nullable: true
          example: abc-123
        spanId:
          type: string
          maxLength: 150
          nullable: true
          example: def-456
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          example:
            endpoint: /payments
            userId: 42

    LogLevel:
      type: string
      enum:
        - TRACE
        - DEBUG
        - INFO
        - WARN
        - ERROR

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        code:
          type: string
          example: QUOTA_EXCEEDED
        message:
          type: string
          example: Invalid request payload.
        path:
          type: string
          example: /api/v1/log-events
        timestamp:
          type: string
          format: date-time

openapi: 3.0.3

info:
  title: Log Stream Service API
  version: 1.2.0
  description: >
    Lightweight real-time log relay service. Applications register as log sources,
    generate ingestion tokens, send short-lived log events, and configure Slack
    or Discord webhook destinations for aggregated error alerts.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Dashboard authentication helpers
  - name: Users
    description: Authenticated user endpoints
  - name: Apps
    description: Log-producing application/source registration
  - name: App Tokens
    description: Ingestion token generation and management
  - name: Ingestion Tokens
    description: Resolve pasted ingestion tokens to app session context
  - name: Log Events
    description: Log ingestion endpoints
  - name: Alert Destinations
    description: Slack and Discord webhook destinations for aggregated error alerts
  - name: Kafka
    description: >
      Kafka-backed ingestion pipeline intended to replace the synchronous Log Events
      path. Events are queued on the central-log-events topic; normalization, alert
      aggregation, analysis, and delivery happen asynchronously in consumers, with
      alert/analysis communication flowing over Kafka topics between services.

paths:
  /api/v1/users:
    post:
      tags:
        - Users
      operationId: createUser
      summary: Create a user
      deprecated: true
      description: Deprecated local bootstrap endpoint. Production clients should use GET /api/v1/users/me.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me:
    get:
      tags:
        - Users
      operationId: getCurrentUser
      summary: Get or create the signed-in management user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Signed-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/demo-session:
    post:
      tags:
        - Auth
      operationId: createDemoSession
      summary: Create a demo dashboard session
      description: Returns a short-lived server-signed JWT only when demo bypass is enabled and the submitted email matches the configured demo email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoSessionRequest'
      responses:
        '200':
          description: Demo session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSessionResponse'
        '403':
          description: Demo bypass disabled or email not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps:
    post:
      tags:
        - Apps
      operationId: createApp
      summary: Register a log-producing app/source
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppRequest'
      responses:
        '201':
          description: App/source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '404':
          description: Owner user not found for the local bootstrap flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: App quota or rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Apps
      operationId: getAppsByOwnerEmail
      summary: Get apps for the signed-in user
      security:
        - BearerAuth: []
      parameters:
        - name: ownerEmail
          in: query
          required: false
          schema:
            type: string
            format: email
          description: Optional legacy filter. For authenticated requests it must match the signed-in email.
      responses:
        '200':
          description: Apps found for owner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppResponse'

  /api/v1/apps/{appId}:
    get:
      tags:
        - Apps
      operationId: getAppById
      summary: Get app/source by id
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: App found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: App is owned by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/tokens:
    post:
      tags:
        - App Tokens
      operationId: createAppToken
      summary: Generate a one-time visible ingestion token
      description: >
        Creates an ingestion token for a registered app. The raw token is returned once.
        Store only a hash of the token in the database.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppTokenRequest'
      responses:
        '201':
          description: Token generated. Raw token is shown once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppTokenResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Token quota or rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - App Tokens
      operationId: getAppTokens
      summary: List app tokens without raw token values
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Tokens found for app
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppTokenResponse'

  /api/v1/apps/{appId}/tokens/{tokenId}/revoke:
    patch:
      tags:
        - App Tokens
      operationId: revokeAppToken
      summary: Revoke an ingestion token
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/TokenId'
      responses:
        '204':
          description: Token revoked
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations:
    post:
      tags:
        - Alert Destinations
      operationId: createAlertDestination
      summary: Create a Slack or Discord alert destination
      description: >
        Registers a Slack or Discord webhook destination for an app. ERROR logs
        for the app are aggregated and sent to enabled destinations.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertDestinationRequest'
      responses:
        '201':
          description: Alert destination created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDestinationResponse'
        '400':
          description: Invalid alert destination payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Alert Destinations
      operationId: getAlertDestinations
      summary: List enabled alert destinations for an app
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
      responses:
        '200':
          description: Alert destinations found for app
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertDestinationResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/apps/{appId}/alert-destinations/{destinationId}:
    delete:
      tags:
        - Alert Destinations
      operationId: deleteAlertDestination
      summary: Delete an alert destination
      description: Soft-deletes or disables a Slack/Discord alert destination.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/DestinationId'
      responses:
        '204':
          description: Alert destination deleted
        '404':
          description: Alert destination not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ingestion-tokens/session:
    get:
      tags:
        - Ingestion Tokens
      operationId: getIngestionTokenSession
      summary: Resolve an ingestion token to its app context
      description: >
        Validates a pasted ingestion token and returns the linked app metadata
        so clients can load destinations without running the full setup flow.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      responses:
        '200':
          description: Token resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionTokenSessionResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /api/v1/log-events:
    post:
      tags:
        - Log Events
      operationId: ingestLogEvent
      summary: Ingest a log event from an external app
      description: >
        Accepts short-lived log events from registered apps. Events are authenticated
        using an app ingestion token, rate-limited, normalized, and logged synchronously.
        This endpoint has no alerting side effect: it does not aggregate, analyze, or
        deliver alerts. Alerting flows exclusively through the Kafka pipeline
        (POST /api/v1/kafka/log-events and /batch).

        The payload is normalized tolerantly so JSON emitted by common logging stacks
        (Logback/Logstash, python-json-logger, Winston, Pino, Android, Flutter) is accepted
        without client-side mapping. See RawLogEvent for accepted field aliases. Canonical
        LogEventRequest payloads are always accepted unchanged.

        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawLogEvent'
      responses:
        '202':
          description: Log accepted for live relay
        '400':
          description: Invalid log payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Log payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/log-events/batch:
    post:
      tags:
        - Log Events
      operationId: ingestLogEventBatch
      summary: Ingest a batch of log events from an external app
      description: >
        Accepts up to 100 log events in one request. Each event is authenticated,
        rate-limited, normalized with the same tolerant rules as the single-event
        endpoint, and logged synchronously. This endpoint has no alerting side effect:
        it does not aggregate, analyze, or deliver alerts. Alerting flows exclusively
        through the Kafka pipeline (POST /api/v1/kafka/log-events and /batch). Events
        that cannot be normalized are reported per index in the response instead of
        failing the whole batch.

        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/RawLogEvent'
      responses:
        '202':
          description: Batch accepted; per-event results in body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEventBatchResponse'
        '400':
          description: Invalid batch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Batch payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Ingestion rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/kafka/log-events:
    post:
      tags:
        - Kafka
      operationId: ingestLogEventViaKafka
      summary: Ingest a log event through the Kafka pipeline
      description: >
        Kafka-backed counterpart of POST /api/v1/log-events, intended to replace it
        once the migration completes. Authenticates the ingestion token, then queues
        the raw event on the central-log-events topic. Normalization, alert
        aggregation, analysis, and delivery happen asynchronously in consumers, so
        only authentication and payload-size limits are enforced synchronously;
        events that fail normalization downstream are dropped and logged rather
        than reported in the HTTP response.

        Accepts the same tolerant RawLogEvent payloads as the synchronous endpoint.
        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
        Available only when the Kafka integration toggle is enabled.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KafkaLogEventPayload'
      responses:
        '202':
          description: Event queued on the central-log-events topic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KafkaPublishResponse'
        '400':
          description: Malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Log payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Kafka integration is disabled or the broker is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/kafka/log-events/batch:
    post:
      tags:
        - Kafka
      operationId: ingestLogEventBatchViaKafka
      summary: Ingest a batch of log events through the Kafka pipeline
      description: >
        Kafka-backed counterpart of POST /api/v1/log-events/batch. Authenticates the
        ingestion token, then queues up to 100 raw events on the central-log-events
        topic in request order. Per-event validation happens asynchronously in
        consumers, so the response reports how many events were queued, not how many
        were valid. Each queued event counts against the ingestion rate limit.

        Request bodies larger than 1 MiB (1048576 bytes) are rejected with 413.
        Available only when the Kafka integration toggle is enabled.
      parameters:
        - $ref: '#/components/parameters/IngestionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/KafkaLogEventPayload'
      responses:
        '202':
          description: Batch queued on the central-log-events topic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KafkaBatchPublishResponse'
        '400':
          description: Invalid batch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid ingestion token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Batch payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Ingestion rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Kafka integration is disabled or the broker is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/kafka/status:
    get:
      tags:
        - Kafka
      operationId: getKafkaStatus
      summary: Report Kafka integration status
      description: >
        Returns whether the Kafka integration toggle is enabled and which topics
        the service publishes to. Never exposes broker addresses or credentials.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Kafka integration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KafkaStatusResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token or server-issued demo JWT for management API calls.

  parameters:
    AppId:
      name: appId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    DestinationId:
      name: destinationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IngestionToken:
      name: X-Ingestion-Token
      in: header
      required: true
      schema:
        type: string
      description: App ingestion token generated for a registered log source.
      example: lss_live_f11n_Mx5e0xy46LJgbycTXsKBFL4qeEa

  schemas:
    CreateUserRequest:
      type: object
      required:
        - email
        - username
      properties:
        email:
          type: string
          format: email
          example: name@example.com
        username:
          type: string
          minLength: 3
          maxLength: 100
          example: name

    UserResponse:
      type: object
      required:
        - id
        - email
        - username
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CreateAppRequest:
      type: object
      required:
        - name
      properties:
        ownerEmail:
          type: string
          format: email
          deprecated: true
          description: Legacy local bootstrap field. Ignored for authenticated requests; owner is derived from the bearer token.
          example: name@example.com
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: payment-service
        description:
          type: string
          maxLength: 500
          nullable: true
          example: Sends live logs from the payment API.

    AppResponse:
      type: object
      required:
        - id
        - ownerUserId
        - name
        - active
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    DemoSessionRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: admin@email.com

    DemoSessionResponse:
      type: object
      required:
        - token
        - email
        - expiresInSeconds
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        expiresInSeconds:
          type: integer
          format: int32
          example: 3600

    CreateAppTokenRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: local-dev-token
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-12-31T23:59:59Z

    CreateAppTokenResponse:
      type: object
      required:
        - id
        - appId
        - name
        - token
        - tokenPrefix
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
          description: Raw ingestion token. Shown once.
          example: lss_live_VKpWnlcYiRz7IVQkDDN0t7QY6wc6zvm3
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AppTokenResponse:
      type: object
      required:
        - id
        - appId
        - name
        - tokenPrefix
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        name:
          type: string
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    IngestionTokenSessionResponse:
      type: object
      required:
        - appId
        - appName
        - tokenPrefix
        - tokenName
      properties:
        appId:
          type: string
          format: uuid
        appName:
          type: string
          example: payment-service
        tokenPrefix:
          type: string
          example: lss_live_VKpW
        tokenName:
          type: string
          example: frontend-demo-token

    CreateAlertDestinationRequest:
      type: object
      required:
        - type
        - name
        - webhookUrl
      properties:
        type:
          $ref: '#/components/schemas/AlertDestinationType'
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: dev-alerts
        webhookUrl:
          type: string
          minLength: 1
          maxLength: 2000
          example: https://discord.com/api/webhooks/...

    AlertDestinationResponse:
      type: object
      required:
        - id
        - appId
        - type
        - name
        - enabled
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AlertDestinationType'
        name:
          type: string
        enabled:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    # TokenUsage and AlertAnalysisResponse are no longer referenced by any documented
    # operation (the alert-analysis endpoints were removed 2026-07-19 as unreachable/
    # dead code). They are kept here deliberately: com.logstream.generated.model
    # versions of both are live production types, built by KafkaConsumerService and
    # consumed by DiscordWebhookSender/SlackWebhookSender/AlertSenderService(Impl) on
    # the Kafka alerting path. openapi-generator (spring generator, interfaceOnly)
    # generates a model class for every schema under components/schemas regardless of
    # path references, so leaving them declared here keeps codegen producing them.
    # Do not prune without re-checking for live com.logstream.generated.model usage.
    TokenUsage:
      type: object
      properties:
        promptTokens:
          type: integer
          example: 186
        completionTokens:
          type: integer
          example: 94
        totalTokens:
          type: integer
          example: 280

    AlertAnalysisResponse:
      type: object
      required:
        - analysis
      properties:
        analysis:
          type: string
          description: Human-readable analysis formatted for Slack, Discord, and the dashboard.
        analysisJson:
          type: string
          description: Raw JSON object returned by the model before display formatting.
        cached:
          type: boolean
          description: True when the analysis was served from the in-memory cache (no OpenAI call).
          example: false
        tokenUsage:
          $ref: '#/components/schemas/TokenUsage'
          nullable: true

    KafkaPublishResponse:
      type: object
      required:
        - topic
        - messageId
        - publishedAt
      properties:
        topic:
          type: string
          description: Kafka topic the event was queued on.
          example: central-log-events
        messageId:
          type: string
          format: uuid
          description: Server-generated message key for tracing the record through the pipeline.
        publishedAt:
          type: string
          format: date-time

    KafkaLogEventPayload:
      type: object
      additionalProperties: true
      description: >
        Raw log event JSON queued as-is on the central-log-events topic. Accepts the
        same tolerant shapes as RawLogEvent; normalization happens asynchronously in
        consumers. Mapped to a Jackson JsonNode in generated server code.
      example:
        levelname: WARNING
        msg: Payment retry scheduled
        '@timestamp': 2026-06-08T18:30:00Z

    KafkaBatchPublishResponse:
      type: object
      required:
        - topic
        - queued
      properties:
        topic:
          type: string
          description: Kafka topic the events were queued on.
          example: central-log-events
        queued:
          type: integer
          description: Number of events queued, in request order. Per-event validation happens asynchronously.
          example: 100
        messageIds:
          type: array
          description: Server-generated message keys, index-aligned with the request array.
          items:
            type: string
            format: uuid

    KafkaStatusResponse:
      type: object
      required:
        - enabled
        - topics
      properties:
        enabled:
          type: boolean
          description: True when the Kafka integration toggle is on.
          example: false
        topics:
          type: array
          description: Topics this service publishes to. Broker addresses are never exposed.
          items:
            type: string
          example:
            - central-log-events
            - alert-messages

    AlertDestinationType:
      type: string
      enum:
        - DISCORD
        - SLACK

    RawLogEvent:
      type: object
      additionalProperties: true
      description: >
        Free-form log event JSON, normalized server-side into the canonical LogEventRequest.
        Accepted field aliases —
        message: message, msg, text, log, body (required; the only mandatory field);
        level: level, severity, levelname, level_name, loglevel, log_level, priority
        (strings such as warning, critical, fatal, verbose, or numeric Pino/Android levels;
        defaults to INFO);
        timestamp: occurredAt, occurred_at, timestamp, @timestamp, time, ts, datetime, date
        (ISO-8601 or epoch seconds/millis; defaults to server receive time);
        id: id, eventId, event_id, uuid, messageId (generated when missing);
        logger: logger, loggerName, logger_name, tag, source, name;
        trace: traceId, trace_id; span: spanId, span_id.
        Unrecognized fields are preserved under metadata.
      example:
        levelname: WARNING
        msg: Payment retry scheduled
        '@timestamp': 2026-06-08T18:30:00Z
        taskName: payments-worker

    LogEventBatchResponse:
      type: object
      required:
        - accepted
        - rejected
      properties:
        accepted:
          type: integer
          description: Number of events accepted for relay.
          example: 98
        rejected:
          type: array
          description: Events that could not be normalized or exceeded the rate limit.
          items:
            $ref: '#/components/schemas/LogEventBatchRejection'

    LogEventBatchRejection:
      type: object
      required:
        - index
        - reason
      properties:
        index:
          type: integer
          description: Zero-based index of the rejected event in the request array.
          example: 3
        reason:
          type: string
          example: Log event must include a message field.

    LogEventRequest:
      type: object
      required:
        - id
        - level
        - message
        - occurredAt
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 150
          description: Client-generated event id for traceability/idempotency.
          example: 01HZABC123
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
          minLength: 1
          maxLength: 5000
          example: Failed to process payment.
        occurredAt:
          type: string
          format: date-time
          example: 2026-06-08T18:30:00Z
        logger:
          type: string
          maxLength: 255
          nullable: true
          example: com.example.PaymentService
        traceId:
          type: string
          maxLength: 150
          nullable: true
          example: abc-123
        spanId:
          type: string
          maxLength: 150
          nullable: true
          example: def-456
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          example:
            endpoint: /payments
            userId: 42

    LogLevel:
      type: string
      enum:
        - TRACE
        - DEBUG
        - INFO
        - WARN
        - ERROR

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        code:
          type: string
          example: QUOTA_EXCEEDED
        message:
          type: string
          example: Invalid request payload.
        path:
          type: string
          example: /api/v1/log-events
        timestamp:
          type: string
          format: date-time

spring:
  config:
    import: optional:dotenv:.env.local
  application:
    name: log-stream-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      # Neon free tier autosuspends compute after ~5 min idle and drops all open
      # connections; never hold idle sockets past that or the first request after
      # an idle period fails on a dead connection.
      minimum-idle: 0
      idle-timeout: 120000
      max-lifetime: 240000
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog.xml
  jpa:
    open-in-view: false

  # Kafka — bootstrap resolved from KAFKA_SERVICE_URI or KAFKA_HOST:KAFKA_PORT
  # (see KafkaConnectionEnvironmentPostProcessor). Empty USER/PASS/CACERT = PLAINTEXT.
  kafka:
    toggle:
      enabled: "${KAFKA_INTEGRATION_TOGGLE:false}"
    bootstrap-servers: ${KAFKA_SERVICE_URI:localhost:9092}

    # Consumer configs
    consumer:
      group-id: default-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "com.logstream.*"

    # Producer configs
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all

    # Streams configs — RF 1 for single-broker / free-tier clusters
    streams:
      application-id: log-stream-service-streams   # required, becomes the consumer group id
      replication-factor: 1
      properties:
        default.replication.factor: 1
        num.standby.replicas: 0

logging:
  level:
    root: INFO
    com.logstream.service.analysis: DEBUG
    com.logstream.service: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.web.client: DEBUG
    org.springframework.kafka.listener: DEBUG
    org.apache.kafka.clients.consumer: INFO

server:
  port: ${PORT:8083}
  servlet:
    session:
      persistent: false

springdoc:
  enable-data-rest: false
  packages-to-scan: com.logstream.controller
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
  api-docs:
    enabled: ${SWAGGER_UI_ENABLED:false}

app:
  cors:
    allowed-origins: "${ALLOWED_ORIGINS:https://prairie-log-api.com,https://www.prairie-log-api.com,https://prairie-log-api.netlify.app,http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000}"
  security:
    jwt-enabled: ${JWT_ENABLED:false}
    auth-enabled: ${AUTH_ENABLED:false}
    firebase-project-id: ${FIREBASE_PROJECT_ID:}
    demo-bypass-enabled: ${DEMO_BYPASS_ENABLED:false}
    demo-bypass-email: ${DEMO_BYPASS_EMAIL:admin@email.com}
    demo-jwt-secret: ${DEMO_JWT_SECRET:}
  quotas:
    max-apps-per-user: ${APP_QUOTAS_MAX_APPS_PER_USER:10}
    max-active-tokens-per-app: ${APP_QUOTAS_MAX_ACTIVE_TOKENS_PER_APP:5}
    max-total-tokens-per-app: ${APP_QUOTAS_MAX_TOTAL_TOKENS_PER_APP:25}
    max-destinations-per-app: ${APP_QUOTAS_MAX_DESTINATIONS_PER_APP:5}
    max-total-destinations-per-app: ${APP_QUOTAS_MAX_TOTAL_DESTINATIONS_PER_APP:25}
  rate-limit:
    management-requests-per-minute: ${APP_RATE_LIMIT_MANAGEMENT_RPM:60}
    ingestion-requests-per-minute: ${APP_RATE_LIMIT_INGESTION_RPM:120}
  ingestion:
    max-payload-bytes: ${APP_INGESTION_MAX_PAYLOAD_BYTES:1048576}
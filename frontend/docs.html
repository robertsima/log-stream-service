<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Docs — PrairieLog</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/config.js" defer></script>
  <script src="js/state.js" defer></script>
  <script src="js/rest-service.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/app.js" defer></script>
  <script src="js/docs.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="nav-logo"></div>
      <div class="nav-menu">
        <ul class="nav-links nav-links-main"></ul>
        <ul class="nav-links nav-links-docs"></ul>
      </div>
    </div>
  </nav>

  <main class="page-main docs-page">
    <header class="page-header">
      <h1>API Documentation</h1>
      <p>
        Endpoint reference with request and response examples from the OpenAPI contract.
      </p>
      <button type="button" id="download-openapi-button">
        <i data-lucide="download" class="icon" aria-hidden="true"></i>
        <span class="btn-label">Download OpenAPI JSON</span>
      </button>
    </header>

    <div id="endpoint-list">
      <p class="muted loading-row"><i data-lucide="loader-circle" class="icon icon-spin" aria-hidden="true"></i> Loading API contract...</p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 PrairieLog. All rights reserved.</p>
  </footer>
</body>
</html>

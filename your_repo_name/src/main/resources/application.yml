spring:
  application:
    name: your_repo_name
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uris:
            - https://<your-keycloak-domain>/realms/your-realm
            - https://<other-domain>/realms/other-realm

server:
  port: 8080
  
springdoc:
  enable-data-rest: false
  packages-to-scan: com.example_project_name.controller
# issuer-uris can be omitted if keycloak.auth-server-url and keycloak.realm are configured.

# Optional database configuration (Postgres) - uncomment and set real values for runtime use.
